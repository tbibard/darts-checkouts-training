<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darts Checkouts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<header id="app-header">
    DARTS CHECKOUTS
    <div id="header-right">
        <div id="lang-switcher">
            <button class="lang-btn active" data-lang="fr">FR</button>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <button id="btn-version" class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#releases-modal"></button>
    </div>
</header>

<!-- Modal releases -->
<div class="modal fade" id="releases-modal" tabindex="-1" aria-labelledby="releases-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="releases-modal-label">Historique des versions</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fermer"></button>
            </div>
            <div class="modal-body" id="releases-list"></div>
        </div>
    </div>
</div>

<main id="main">

    <!-- ═══ CIBLE ═══ -->
    <div id="board-area">
        <svg id="dartboard" viewBox="-340 -340 680 680"
             xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- ═══ PANNEAU ═══ -->
    <div id="panel">

        <!-- Bouton -->
        <button id="btn-new" class="btn btn-warning w-100"
                data-i18n="btn.newFinish">Nouveau Checkout</button>

        <!-- Checkout personnalisé -->
        <div class="input-group">
            <input type="number" class="form-control form-control-sm" id="custom-checkout-input"
                   min="2" max="170" placeholder="2 – 170">
            <button id="btn-custom" class="btn btn-outline-warning btn-sm"
                    data-i18n="btn.customFinish">Checkout personnalisé</button>
        </div>
        <div id="custom-error" class="d-none" style="font-size:0.75rem;color:#dc3545;"></div>

        <!-- Finish -->
        <div class="card-dark text-center">
            <div class="panel-label" data-i18n="label.finish">Checkout à réaliser</div>
            <div id="finish-value">—</div>
            <div id="remaining-value">—</div>
        </div>

        <!-- Fléchettes -->
        <div class="card-dark">
            <div class="panel-label" style="margin-bottom:6px" data-i18n="label.darts">Fléchettes</div>
            <div class="d-flex gap-2" id="dart-slots">
                <div class="dart-slot"><span class="slot-num">1</span></div>
                <div class="dart-slot"><span class="slot-num">2</span></div>
                <div class="dart-slot"><span class="slot-num">3</span></div>
            </div>
        </div>

        <!-- Timer + Résultat -->
        <div id="timer-card" class="card-dark text-center" style="padding: 8px 13px;">
            <div class="panel-label" data-i18n="label.time">Temps</div>
            <div id="timer">0.0s</div>
            <div id="result-inline"></div>
        </div>

        <!-- Options -->
        <div class="card-dark">
            <div class="panel-label" style="margin-bottom:7px" data-i18n="label.options">Options</div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" role="switch" id="opt-99">
                <label class="form-check-label" for="opt-99" style="font-size:0.82rem"
                       data-i18n="opt.finish99">Finish ≥ 99 uniquement</label>
            </div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" role="switch" id="opt-hide-rem">
                <label class="form-check-label" for="opt-hide-rem" style="font-size:0.82rem"
                       data-i18n="opt.hideRemaining">Masquer le restant</label>
            </div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" role="switch" id="opt-miss-triple">
                <label class="form-check-label" for="opt-miss-triple" style="font-size:0.82rem">
                    <span data-i18n="opt.missedTriple">Triple manqué</span>
                    <small style="color:#8b949e" data-i18n="opt.missedTriple.note">(aléatoire)</small>
                </label>
            </div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" role="switch" id="opt-wide-rings">
                <label class="form-check-label" for="opt-wide-rings" style="font-size:0.82rem"
                       data-i18n="opt.wideRings">Triples et doubles élargis</label>
            </div>
            <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" role="switch" id="opt-voice" checked>
                <label class="form-check-label" for="opt-voice" style="font-size:0.82rem"
                       data-i18n="opt.voice">Voix (son)</label>
            </div>
        </div>

        <!-- Stats session -->
        <div class="card-dark">
            <div class="panel-label" style="margin-bottom:6px" data-i18n="label.session">Session</div>
            <div class="d-flex gap-1">
                <div class="stat-box flex-fill">
                    <div class="stat-val" id="stat-ok">0</div>
                    <div class="stat-lbl" data-i18n="stat.success">Réussis</div>
                </div>
                <div class="stat-box flex-fill">
                    <div class="stat-val" id="stat-total">0</div>
                    <div class="stat-lbl" data-i18n="stat.total">Total</div>
                </div>
                <div class="stat-box flex-fill">
                    <div class="stat-val" id="stat-rate">—</div>
                    <div class="stat-lbl" data-i18n="stat.rate">Taux</div>
                </div>
            </div>
            <div class="d-flex justify-content-between mt-1" style="font-size:0.68rem;color:#8b949e">
                <small>
                    <span data-i18n="stat.best">Meilleur :</span>
                    <span id="stat-best">—</span>
                </small>
                <small>
                    <span data-i18n="stat.avg">Moy. :</span>
                    <span id="stat-avg">—</span>
                </small>
            </div>
        </div>

    </div><!-- /panel -->

    <!-- ═══ CHECKOUTS ALTERNATIFS ═══ -->
    <div id="alt-column" class="d-none">
        <div id="alt-panel" class="card-dark">
            <div class="panel-label" style="margin-bottom:6px"
                 data-i18n="label.alternatives">Checkouts alternatifs</div>
            <div id="alt-list"></div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/dartboard.js"></script>
<script src="js/i18n.js"></script>
<script src="js/checkouts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
